name: lint

# Static analysis: ruff (style) + mypy --strict (types) + import-linter
# (의존 계층 + 외부 의존 forbidden 계약). 모두 빠른 단일 job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check (style + lint rules)
        # pyproject.toml [tool.ruff.lint] select rules.
        run: ruff check src tests

      - name: ruff format --check (format drift)
        # ruff format은 작성자가 명시적으로 적용한 경우만 enforce.
        # 현재는 자동 format 사용 안 함 — 향후 활성화 시 본 step 활성.
        if: false
        run: ruff format --check src tests

      - name: mypy --strict (메인 패키지)
        # pyproject.toml [tool.mypy] strict = true + pydantic.mypy plugin.
        run: mypy --strict -p krtour.map

      - name: import-linter (의존 계층 + forbidden contracts)
        # ADR-002 layered + ADR-020 fastapi/uvicorn 금지 + ADR-030 cache 금지 +
        # ADR-103 kafka 금지. 위반 시 exit 1.
        run: |
          python -c "from importlinter.cli import lint_imports_command; \
                    import sys; sys.argv=['lint-imports']; lint_imports_command()"
