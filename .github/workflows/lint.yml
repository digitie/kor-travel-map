name: lint

# Static analysis: ruff (style) + mypy --strict (types) + import-linter
# (의존 계층 + 외부 의존 forbidden 계약). 모두 빠른 단일 job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packages/kor-travel-map-api/pyproject.toml
            packages/kor-travel-map-dagster/pyproject.toml

      - name: docs prod-endpoint redaction guard (#508)
        # 커밋된 docs에 prod 도메인(digitie.mywire.org)·사설 호스트 IP(192.168.x.x)가
        # 새지 않도록 검사. 실제 값은 gitignored .env/.env.prod·ops note에만. 위반 시 exit 1.
        # stdlib + git만 사용 — 패키지 설치 전에도 동작하지만 setup-python 뒤에 둔다.
        run: python scripts/check_prod_redaction.py

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e packages/kor-travel-map-api
          pip install -e packages/kor-travel-map-dagster

      - name: ruff check (style + lint rules)
        # pyproject.toml [tool.ruff.lint] select rules.
        run: ruff check src tests packages/kor-travel-map-api/src packages/kor-travel-map-api/tests packages/kor-travel-map-dagster/src packages/kor-travel-map-dagster/tests

      - name: ruff format --check (format drift)
        # ruff format은 작성자가 명시적으로 적용한 경우만 enforce.
        # 현재는 자동 format 사용 안 함 — 향후 활성화 시 본 step 활성.
        if: false
        run: ruff format --check src tests

      - name: mypy --strict (메인 패키지)
        # pyproject.toml [tool.mypy] strict = true + pydantic.mypy plugin.
        run: mypy --strict -p kortravelmap

      - name: mypy --strict (API 패키지)
        run: mypy --strict -p kortravelmap.api

      - name: mypy --strict (Dagster 패키지)
        run: mypy --strict -p kortravelmap.dagster

      - name: import-linter (의존 계층 + forbidden contracts)
        # ADR-002 layered + ADR-020 fastapi/uvicorn 금지 + ADR-030 cache 금지 +
        # ADR-103 kafka 금지. 위반 시 exit 1.
        run: |
          python -c "from importlinter.cli import lint_imports_command; \
                    import sys; sys.argv=['lint-imports']; lint_imports_command()"
