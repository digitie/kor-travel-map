services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    environment:
      POSTGRES_DB: ${KRTOUR_MAP_POSTGRES_DB:-krtour_map}
      POSTGRES_USER: ${KRTOUR_MAP_POSTGRES_USER:-krtour_map}
      POSTGRES_PASSWORD: ${KRTOUR_MAP_POSTGRES_PASSWORD:-krtour_map}
      KRTOUR_MAP_DAGSTER_POSTGRES_DB: ${KRTOUR_MAP_DAGSTER_POSTGRES_DB:-krtour_map_dagster}
    ports:
      - "${KRTOUR_MAP_POSTGRES_HOST_PORT:-15433}:5432"
    volumes:
      - krtour-map-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KRTOUR_MAP_POSTGRES_USER:-krtour_map} -d ${KRTOUR_MAP_POSTGRES_DB:-krtour_map}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  dagster-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KRTOUR_MAP_POSTGRES_DB: ${KRTOUR_MAP_POSTGRES_DB:-krtour_map}
      KRTOUR_MAP_POSTGRES_USER: ${KRTOUR_MAP_POSTGRES_USER:-krtour_map}
      KRTOUR_MAP_POSTGRES_PASSWORD: ${KRTOUR_MAP_POSTGRES_PASSWORD:-krtour_map}
      KRTOUR_MAP_DAGSTER_POSTGRES_DB: ${KRTOUR_MAP_DAGSTER_POSTGRES_DB:-krtour_map_dagster}
      PGPASSWORD: ${KRTOUR_MAP_POSTGRES_PASSWORD:-krtour_map}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if ! echo "$$KRTOUR_MAP_DAGSTER_POSTGRES_DB" | grep -Eq '^[A-Za-z_][A-Za-z0-9_]*$$'; then
          echo "invalid KRTOUR_MAP_DAGSTER_POSTGRES_DB=$$KRTOUR_MAP_DAGSTER_POSTGRES_DB" >&2
          exit 1
        fi
        if psql -h postgres -U "$$KRTOUR_MAP_POSTGRES_USER" -d "$$KRTOUR_MAP_POSTGRES_DB" -tAc "SELECT 1 FROM pg_database WHERE datname = '$$KRTOUR_MAP_DAGSTER_POSTGRES_DB'" | grep -q 1; then
          echo "Dagster metadata DB exists: $$KRTOUR_MAP_DAGSTER_POSTGRES_DB"
        else
          createdb -h postgres -U "$$KRTOUR_MAP_POSTGRES_USER" "$$KRTOUR_MAP_DAGSTER_POSTGRES_DB"
          echo "Dagster metadata DB created: $$KRTOUR_MAP_DAGSTER_POSTGRES_DB"
        fi

  rustfs-perms:
    image: alpine:3.20
    user: root
    volumes:
      - krtour-map-rustfs:/data
    command: ["sh", "-c", "chown -R 10001:10001 /data"]

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID:-krtour-map-dev-access}
      RUSTFS_SECRET_KEY: ${KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-krtour-map-dev-secret}
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    command: ["/data"]
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    ports:
      - "${KRTOUR_MAP_RUSTFS_API_PORT:-9003}:9000"
      - "${KRTOUR_MAP_RUSTFS_CONSOLE_PORT:-9004}:9001"
    volumes:
      - krtour-map-rustfs:/data

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      - rustfs
    environment:
      KRTOUR_MAP_OBJECT_STORE_BUCKET: ${KRTOUR_MAP_OBJECT_STORE_BUCKET:-krtour-map}
      KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
      KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID:-krtour-map-dev-access}
      KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-krtour-map-dev-secret}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set rustfs http://rustfs:9000 "$$KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID" "$$KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY"; do
          sleep 2
        done
        mc mb --ignore-existing "rustfs/$$KRTOUR_MAP_OBJECT_STORE_BUCKET"
        mc mb --ignore-existing "rustfs/$$KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      KRTOUR_MAP_ADMIN_HOST: 0.0.0.0
      KRTOUR_MAP_ADMIN_PORT: ${KRTOUR_MAP_ADMIN_PORT:-9011}
      KRTOUR_MAP_ADMIN_CORS_ALLOW_ORIGINS: '["http://localhost:${KRTOUR_MAP_ADMIN_WEB_PORT:-9012}","http://127.0.0.1:${KRTOUR_MAP_ADMIN_WEB_PORT:-9012}"]'
      KRTOUR_MAP_ADMIN_DAGSTER_URL: ${KRTOUR_MAP_DOCKER_ADMIN_DAGSTER_URL:-http://dagster:${KRTOUR_MAP_DAGSTER_PORT:-9013}}
      KRTOUR_MAP_ADMIN_DAGSTER_ALLOWED_HOSTS: '${KRTOUR_MAP_DOCKER_ADMIN_DAGSTER_ALLOWED_HOSTS:-["dagster","127.0.0.1","localhost","::1"]}'
      KRTOUR_MAP_PG_DSN: ${KRTOUR_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://krtour_map:krtour_map@postgres:5432/krtour_map}
      KRTOUR_MAP_OBJECT_STORE_ENDPOINT_URL: ${KRTOUR_MAP_DOCKER_OBJECT_STORE_ENDPOINT_URL:-http://rustfs:9000}
      KRTOUR_MAP_OBJECT_STORE_BUCKET: ${KRTOUR_MAP_OBJECT_STORE_BUCKET:-krtour-map}
      KRTOUR_MAP_OBJECT_STORE_REGION: ${KRTOUR_MAP_OBJECT_STORE_REGION:-us-east-1}
      KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID:-krtour-map-dev-access}
      KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-krtour-map-dev-secret}
      KRTOUR_MAP_OBJECT_STORE_PUBLIC_BASE_URL: ${KRTOUR_MAP_OBJECT_STORE_PUBLIC_BASE_URL:-http://127.0.0.1:${KRTOUR_MAP_RUSTFS_API_PORT:-9003}/${KRTOUR_MAP_OBJECT_STORE_BUCKET:-krtour-map}}
      KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
      KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY: ${KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KRTOUR_MAP_OPINET_API_KEY: ${KRTOUR_MAP_OPINET_API_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KRTOUR_MAP_KREX_EX_API_KEY: ${KRTOUR_MAP_KREX_EX_API_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KRTOUR_MAP_KREX_GO_API_KEY: ${KRTOUR_MAP_KREX_GO_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}}
      KRTOUR_MAP_ADMIN_KMA_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_KMA_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KMA_SERVICE_KEY:-${KMA_API_KEY:-}}}}
      KRTOUR_MAP_ADMIN_KMA_APIHUB_KEY: ${KRTOUR_MAP_ADMIN_KMA_APIHUB_KEY:-${KMA_APIHUB_AUTH_KEY:-${KMA_APIHUB_KEY:-}}}
      KRTOUR_MAP_ADMIN_OPINET_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_OPINET_SERVICE_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KRTOUR_MAP_ADMIN_DATAGOKR_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_DATAGOKR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KRTOUR_MAP_ADMIN_VISITKOREA_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_VISITKOREA_SERVICE_KEY:-${KTO_DATA_GO_KR_SERVICE_KEY:-${VISITKOREA_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-}}}}
      KRTOUR_MAP_ADMIN_KREX_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_KREX_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KRTOUR_MAP_ADMIN_KNPS_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_KNPS_SERVICE_KEY:-${KNPS_SERVICE_KEY:-${KNPS_API_KEY:-}}}
      KRTOUR_MAP_ADMIN_AIRKOREA_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_AIRKOREA_SERVICE_KEY:-${AIRKOREA_SERVICE_KEY:-${AIRKOREA_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-}}}}
      KRTOUR_MAP_ADMIN_KRFOREST_SERVICE_KEY: ${KRTOUR_MAP_ADMIN_KRFOREST_SERVICE_KEY:-${KRFOREST_SERVICE_KEY:-${KRFOREST_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-}}}}
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "${KRTOUR_MAP_ADMIN_PORT:-9011}:${KRTOUR_MAP_ADMIN_PORT:-9011}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/debug/health' % os.environ.get('KRTOUR_MAP_ADMIN_PORT', '9011'), timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_KRTOUR_MAP_ADMIN_API: ${NEXT_PUBLIC_KRTOUR_MAP_ADMIN_API:-http://127.0.0.1:${KRTOUR_MAP_ADMIN_PORT:-9011}}
        NEXT_PUBLIC_KRTOUR_MAP_DAGSTER_URL: ${NEXT_PUBLIC_KRTOUR_MAP_DAGSTER_URL:-http://127.0.0.1:${KRTOUR_MAP_DAGSTER_PORT:-9013}}
        NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-${KRADDR_GEO_VWORLD_API_KEY:-${VWORLD_API_KEY:-}}}
    environment:
      NEXT_PUBLIC_KRTOUR_MAP_ADMIN_API: ${NEXT_PUBLIC_KRTOUR_MAP_ADMIN_API:-http://127.0.0.1:${KRTOUR_MAP_ADMIN_PORT:-9011}}
      NEXT_PUBLIC_KRTOUR_MAP_DAGSTER_URL: ${NEXT_PUBLIC_KRTOUR_MAP_DAGSTER_URL:-http://127.0.0.1:${KRTOUR_MAP_DAGSTER_PORT:-9013}}
      NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-${KRADDR_GEO_VWORLD_API_KEY:-${VWORLD_API_KEY:-}}}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${KRTOUR_MAP_ADMIN_WEB_PORT:-9012}:9012"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9012/').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  dagster:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
    command:
      - /bin/sh
      - -c
      - dagster-webserver -m krtour.map_dagster.definitions -h 0.0.0.0 -p "$${KRTOUR_MAP_DAGSTER_PORT:-9013}"
    env_file:
      - path: .env
        required: false
    environment:
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_DISABLE_TELEMETRY: ${DAGSTER_DISABLE_TELEMETRY:-yes}
      KRTOUR_MAP_DAGSTER_PORT: ${KRTOUR_MAP_DAGSTER_PORT:-9013}
      KRTOUR_MAP_DAGSTER_PG_URL: ${KRTOUR_MAP_DOCKER_DAGSTER_PG_URL:-postgresql://krtour_map:krtour_map@postgres:5432/krtour_map_dagster}
      KRTOUR_MAP_PG_DSN: ${KRTOUR_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://krtour_map:krtour_map@postgres:5432/krtour_map}
      KRTOUR_MAP_OBJECT_STORE_ENDPOINT_URL: ${KRTOUR_MAP_DOCKER_OBJECT_STORE_ENDPOINT_URL:-http://rustfs:9000}
      KRTOUR_MAP_OBJECT_STORE_BUCKET: ${KRTOUR_MAP_OBJECT_STORE_BUCKET:-krtour-map}
      KRTOUR_MAP_OBJECT_STORE_REGION: ${KRTOUR_MAP_OBJECT_STORE_REGION:-us-east-1}
      KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID:-krtour-map-dev-access}
      KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-krtour-map-dev-secret}
      KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
      KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY: ${KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KRTOUR_MAP_OPINET_API_KEY: ${KRTOUR_MAP_OPINET_API_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KRTOUR_MAP_KREX_EX_API_KEY: ${KRTOUR_MAP_KREX_EX_API_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KRTOUR_MAP_KREX_GO_API_KEY: ${KRTOUR_MAP_KREX_GO_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}}
    depends_on:
      dagster-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "${KRTOUR_MAP_DAGSTER_PORT:-9013}:${KRTOUR_MAP_DAGSTER_PORT:-9013}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/' % os.environ.get('KRTOUR_MAP_DAGSTER_PORT', '9013'), timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_DISABLE_TELEMETRY: ${DAGSTER_DISABLE_TELEMETRY:-yes}
      KRTOUR_MAP_DAGSTER_PG_URL: ${KRTOUR_MAP_DOCKER_DAGSTER_PG_URL:-postgresql://krtour_map:krtour_map@postgres:5432/krtour_map_dagster}
      KRTOUR_MAP_PG_DSN: ${KRTOUR_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://krtour_map:krtour_map@postgres:5432/krtour_map}
      KRTOUR_MAP_OBJECT_STORE_ENDPOINT_URL: ${KRTOUR_MAP_DOCKER_OBJECT_STORE_ENDPOINT_URL:-http://rustfs:9000}
      KRTOUR_MAP_OBJECT_STORE_BUCKET: ${KRTOUR_MAP_OBJECT_STORE_BUCKET:-krtour-map}
      KRTOUR_MAP_OBJECT_STORE_REGION: ${KRTOUR_MAP_OBJECT_STORE_REGION:-us-east-1}
      KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KRTOUR_MAP_OBJECT_STORE_ACCESS_KEY_ID:-krtour-map-dev-access}
      KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KRTOUR_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-krtour-map-dev-secret}
      KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET: ${KRTOUR_MAP_OFFLINE_UPLOAD_BUCKET:-krtour-uploads}
      KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KRTOUR_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY: ${KRTOUR_MAP_DATA_GO_KR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KRTOUR_MAP_OPINET_API_KEY: ${KRTOUR_MAP_OPINET_API_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KRTOUR_MAP_KREX_EX_API_KEY: ${KRTOUR_MAP_KREX_EX_API_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KRTOUR_MAP_KREX_GO_API_KEY: ${KRTOUR_MAP_KREX_GO_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}}
    depends_on:
      dagster-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    command: ["dagster-daemon", "run", "-m", "krtour.map_dagster.definitions"]

volumes:
  krtour-map-postgres:
  krtour-map-rustfs:
