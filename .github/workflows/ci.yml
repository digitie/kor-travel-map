name: ci

# pytest unit + integration + fixture replay + coverage.
# - unit: Python 3.11/3.12/3.13 matrix. Docker 불필요.
# - integration: Python 3.13 단일 job. testcontainers가 PostGIS 컨테이너 자동 부팅
#   (`postgis/postgis:16-3.5-alpine`, ADR-007).
# - fixture replay: `tests/fixtures/`가 생기면 항상 별도 job에서 실행한다.
# - coverage: ADR-032 단계적 상향 schedule, 현재 fail_under=80 (pyproject.toml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 PR/branch 안에서 push 연속 시 이전 실행을 취소해 CI 시간 절약.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packages/kor-travel-map-api/pyproject.toml
            packages/kor-travel-map-dagster/pyproject.toml

      - name: Install package + dev/geo extras
        run: |
          python -m pip install --upgrade pip
          # geo extra는 GDAL system dependency 필요 — Sprint 2부터 별도 GDAL setup job
          pip install -e ".[dev]"

      - name: Install kor-travel-map-api (editable)
        # PR#35로 첫 FastAPI 라우터 머지 — 본 step에서 install + 후속 step에서
        # 패키지 tests 실행. 메인 라이브러리 coverage에는 포함되지 않는다 (별도
        # tests/ 트리, API package pyproject은 독립 dev deps).
        run: |
          pip install -e packages/kor-travel-map-api

      - name: Install kor-travel-map-dagster (editable)
        # ADR-045: Dagster code location은 kor-travel-map monorepo가 소유한다.
        # 메인 라이브러리는 Dagster를 import하지 않으므로 별도 패키지로 설치한다.
        run: |
          pip install -e packages/kor-travel-map-dagster

      - name: Run unit + lint tests
        run: |
          pytest tests/unit tests/lint -q \
            --cov=src/kortravelmap --cov-report=term-missing --cov-report=xml

      - name: Run kor-travel-map-api unit tests
        # 본 step은 메인 lib coverage gate(ADR-032)에 영향 X — API 패키지
        # 자체 회귀 차단용. fail이면 PR 머지 차단.
        run: |
          pytest packages/kor-travel-map-api/tests/ -q

      - name: Run kor-travel-map-dagster unit tests
        run: |
          pytest packages/kor-travel-map-dagster/tests/ -q

      - name: Upload coverage XML (latest Python only)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  integration:
    name: pytest integration (PostGIS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packages/kor-travel-map-api/pyproject.toml
            packages/kor-travel-map-dagster/pyproject.toml

      - name: Install package + dev/geo extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install kor-travel-map-api (editable)
        run: |
          pip install -e packages/kor-travel-map-api

      - name: Install kor-travel-map-dagster (editable)
        run: |
          pip install -e packages/kor-travel-map-dagster

      - name: Run integration tests (testcontainers PostGIS via Docker)
        # Docker는 ubuntu-latest runner에서 자동 제공.
        # 통합 테스트는 conftest의 pg_container fixture가 PostGIS 컨테이너 자동 부팅.
        run: |
          pytest tests/integration -q --no-cov

  fixture-replay:
    name: pytest fixture replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packages/kor-travel-map-api/pyproject.toml
            packages/kor-travel-map-dagster/pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e packages/kor-travel-map-api
          pip install -e packages/kor-travel-map-dagster

      - name: Run fixture replay tests
        run: |
          if [ -d tests/fixtures ]; then
            pytest tests/fixtures -q --no-cov
          else
            echo "tests/fixtures is absent; fixture replay gate is ready but has no replay suite yet."
          fi
