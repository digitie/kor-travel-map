[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "krtour-map-debug-ui"
version = "0.2.0-dev"
description = "Debug REST API and UI for python-krtour-map (intranet-only, no auth)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [{ name = "digitie" }]
keywords = ["tripmate", "krtour-map", "debug", "ui", "fastapi"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
# 본 패키지는 monorepo 동기 release. 메인 패키지와 동일 version 유지.
# 메인 라이브러리는 같은 저장소에서 editable install:
#   uv pip install -e .                          (메인)
#   uv pip install -e packages/krtour-map-debug-ui   (디버그 UI)
# 외부 배포 시에는 git URL+sha 핀 사용 (예: TripMate가 직접 의존하지 않으므로
# 주로 자체 시점에서만 사용).
dependencies = [
  # 같은 저장소 내 메인 패키지에 의존. monorepo editable install.
  # PyPI 배포 시점에는 "python-krtour-map>=0.2,<0.3" 같은 핀으로 교체.
  "python-krtour-map",
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "pydantic>=2.7",
  "pydantic-settings>=2.4",
  # PR#47: ETL preview `?source=live`에서 provider raw API 호출용 async client.
  # 메인 lib(`krtour.map`)는 httpx 미사용 — debug-ui가 직접 사용.
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
]

[project.scripts]
krtour-map-debug-ui = "krtour.map_debug_ui.cli:main"   # 추후 typer CLI 시점에 활성화

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
# 같은 `krtour` namespace를 메인 패키지와 공유 (ADR-022, PEP 420).
# src/krtour/__init__.py은 생성 금지.
include = ["krtour.map_debug_ui*"]
namespaces = true

[tool.setuptools.package-data]
"krtour.map_debug_ui" = ["py.typed"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC", "PIE", "PT", "RET", "SIM", "TID"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]
