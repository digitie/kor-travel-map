name: ci

# pytest unit + integration (testcontainers PostGIS via Docker-in-Docker) + coverage.
# - unit: лӘЁл“  environmentм—җм„ң мӢӨн–ү (Docker л¶Ҳн•„мҡ”).
# - integration: tests/integration/ вҖ” testcontainersк°Җ PostGIS м»Ён…Ңмқҙл„Ҳ мһҗлҸҷ л¶ҖнҢ…
#   (`postgis/postgis:16-3.5-alpine`, ADR-007). GHA runnerлҠ” Docker daemon мһҗлҸҷ м ңкіө.
# - coverage: ADR-032 лӢЁкі„м Ғ мғҒн–Ҙ schedule, нҳ„мһ¬ fail_under=50 (pyproject.toml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# лҸҷмқј PR/branch м•Ҳм—җм„ң push м—°мҶҚ мӢң мқҙм „ мӢӨн–үмқ„ м·ЁмҶҢн•ҙ CI мӢңк°„ м Ҳм•Ҫ.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev/geo extras
        run: |
          python -m pip install --upgrade pip
          # geo extraлҠ” GDAL system dependency н•„мҡ” вҖ” Sprint 2л¶Җн„° лі„лҸ„ GDAL setup job
          pip install -e ".[dev]"

      - name: Install krtour-map-admin (editable, PR#35+)
        # PR#35лЎң мІ« FastAPI лқјмҡ°н„° лЁём§Җ вҖ” ліё stepм—җм„ң install + нӣ„мҶҚ stepм—җм„ң
        # нҢЁнӮӨм§Җ tests мӢӨн–ү. л©”мқё лқјмқҙлёҢлҹ¬лҰ¬ coverageм—җлҠ” нҸ¬н•Ёлҗҳм§Җ м•ҠлҠ”лӢӨ (лі„лҸ„
        # tests/ нҠёлҰ¬, debug-ui pyprojectмқҖ лҸ…лҰҪ dev deps).
        run: |
          pip install -e packages/krtour-map-admin

      - name: Run unit tests (without integration)
        run: |
          pytest tests/ --ignore=tests/integration -q \
            --cov=src/krtour/map --cov-report=term-missing --cov-report=xml

      - name: Run krtour-map-admin unit tests
        # ліё stepмқҖ л©”мқё lib coverage gate(ADR-032)м—җ мҳҒн–Ҙ X вҖ” debug-ui нҢЁнӮӨм§Җ
        # мһҗмІҙ нҡҢк·Җ м°ЁлӢЁмҡ©. failмқҙл©ҙ PR лЁём§Җ м°ЁлӢЁ.
        run: |
          pytest packages/krtour-map-admin/tests/ -q

      - name: Run integration tests (testcontainers PostGIS via Docker)
        # DockerлҠ” ubuntu-latest runnerм—җм„ң мһҗлҸҷ м ңкіө.
        # нҶөн•© н…ҢмҠӨнҠёлҠ” conftestмқҳ pg_container fixtureк°Җ PostGIS м»Ён…Ңмқҙл„Ҳ мһҗлҸҷ л¶ҖнҢ….
        run: |
          pytest tests/integration -q --no-cov

      - name: Upload coverage XML (latest Python only)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
