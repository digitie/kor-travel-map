# Alembic configuration — `python-krtour-map` (ADR-007).
#
# DSN은 ``KRTOUR_MAP_PG_DSN`` 환경변수로 주입 (alembic/env.py에서 처리).
# 본 ini의 ``sqlalchemy.url``은 placeholder — env.py가 override.
#
# 사용:
#   alembic upgrade head
#   alembic revision --autogenerate -m "<message>"
#   alembic downgrade -1

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# placeholder — env.py가 KRTOUR_MAP_PG_DSN env로 override.
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]
hooks = ruff_format,ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix --select I REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
