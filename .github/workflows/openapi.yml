name: openapi

# ADR-031 — 디버그 패키지 OpenAPI export drift gate.
# Sprint 1 (현재): krtour.map_debug_ui.app 모듈 미존재 — script가 명확한
# SystemExit 메시지로 실패. 본 workflow는 Sprint 2 첫 FastAPI 라우터 PR에서
# `continue-on-error: false`로 전환되어 정상 동작 시작.
#
# 활성화 후 검증:
# 1. `--check` 모드 — git working tree의 packages/krtour-map-debug-ui/openapi.json
#    이 라우터 + DTO의 실제 spec과 일치하는지 비교 (drift 시 exit 1).
# 2. 라우터/DTO 변경 PR은 반드시 openapi.json 갱신 commit 동반.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'src/krtour/map/dto/**'
      - 'packages/krtour-map-debug-ui/**'
      - '.github/workflows/openapi.yml'

concurrency:
  group: openapi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install main package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install krtour-map-debug-ui (editable)
        # Sprint 1: 패키지 skeleton만 존재. FastAPI app 모듈은 Sprint 2 첫 라우터
        # PR에서 활성화. 미존재 시 본 step도 graceful skip.
        run: |
          if [ -f packages/krtour-map-debug-ui/pyproject.toml ]; then
            pip install -e packages/krtour-map-debug-ui || echo "debug-ui install failed (Sprint 1 skeleton)"
          fi

      - name: OpenAPI drift check (ADR-031)
        # Sprint 1은 app 모듈 미존재로 SystemExit — `continue-on-error: true`로
        # CI green 유지. Sprint 2 첫 라우터 PR에서 `continue-on-error` 제거.
        continue-on-error: true
        run: |
          python packages/krtour-map-debug-ui/scripts/export_openapi.py \
            --check \
            --output packages/krtour-map-debug-ui/openapi.json
