[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "python-krtour-map"
version = "0.2.0-dev"
description = "TripMate map feature aggregation and CRUD contracts (v2 design stage)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [{ name = "digitie" }]
keywords = ["tripmate", "map", "features", "korea", "travel", "postgis"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
# v2 설계 단계 — dependencies는 코드 작성 단계에서 ADR과 함께 확정.
# 아래는 ADR-007/008/...에서 합의된 1차 스택의 placeholder.
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.4",
  "sqlalchemy>=2.0",
  "geoalchemy2>=0.15",
  "asyncpg>=0.29",
  "psycopg[binary,pool]>=3.2",
  "shapely>=2.0",
  "pyproj>=3.6",  # ADR-012 좌표 변환 / ADR-030 narrow cache singleton
  "alembic>=1.13",  # ADR-007 schema migration
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5",
  "hypothesis>=6.100",
  "ruff>=0.5",
  "mypy>=1.10",
  "import-linter>=2.0",
  "testcontainers[postgres]>=4",
  "vcrpy>=6",
  "coverage>=7",
]
# 디버그 REST API/UI는 별도 패키지로 분리 (ADR-020):
#   `packages/krtour-map-debug-ui/`. FastAPI/Uvicorn 의존성은 거기 있다.
geo = [
  "geopandas>=1.0",
  "gdal>=3.8",      # 시스템 GDAL 버전과 맞춤
]
providers = [
  # provider 라이브러리는 git URL + commit sha 핀 (코드 작성 단계에서 ADR과 함께 확정)
  # "python-kraddr-base @ git+https://github.com/digitie/python-kraddr-base.git@<sha>",
  # "python-kraddr-geo  @ git+https://github.com/digitie/python-kraddr-geo.git@<sha>",
  # "python-visitkorea-api @ git+...",
  # "python-kasi-api     @ git+...",
  # "python-mois-api     @ git+...",
  # "python-opinet-api   @ git+...",
  # "python-krex-api     @ git+...",
  # "python-kma-api      @ git+...",
  # "python-krairport-api @ git+...",
  # "python-khoa-api     @ git+...",
  # "python-airkorea-api @ git+...",
  # "python-mcst-api     @ git+...",
  # "python-krforest-api @ git+...",
  # "python-krheritage-api @ git+...",
  # python-knps-api: keyless file dataset client (ADR-028 + amendment 2026-05-25).
  # PR#4 (codex/keyless-file-download-dtos) merged → ApiEndpoint/Page 삭제,
  # KNPS_SERVICE_KEY 사용 안 함. 사용 시 [providers] extra로 install.
  # "python-knps-api @ git+https://github.com/digitie/python-knps-api.git@06da125f",
  # "python-datagokr-api @ git+...",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
# PEP 420 implicit namespace `krtour` + 메인 패키지 `krtour.map` (ADR-022).
# src/krtour/__init__.py은 생성 금지 (ADR-022 §결과/부정 + SKILL.md DO NOT #21).
include = ["krtour.map*"]
namespaces = true

[tool.setuptools.package-data]
"krtour.map" = ["py.typed"]

# =============================================================================
# Lint / Type / Test
# =============================================================================

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC", "PIE", "PT", "RET", "SIM", "TID"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]
# ADR-022 — krtour는 PEP 420 implicit namespace이므로 명시적으로 활성화.
# pip install -e . 후에도 mypy는 namespace package를 자동 인식 못함.
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "src"]
asyncio_mode = "auto"
# session-scope async fixture (pg_engine)와 function-scope async test가 동일
# event loop을 공유해야 함 — pytest-asyncio 0.23+ 권장 설정. 미설정 시 testcontainers
# PostGIS 통합 테스트에서 "Task got Future attached to a different loop" 발생.
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
addopts = "-ra --strict-markers --strict-config"
markers = [
  "unit: 단위 테스트 — DB 없이 Fake repo만",
  "integration: 통합 테스트 — testcontainers PostGIS 필요",
  "e2e: 디버그 API + integration DB",
  "slow: 느린 테스트 (CI nightly only)",
  "fixture_replay: replay fixture 회귀",
]
filterwarnings = [
  "error",
  "ignore::DeprecationWarning:pkg_resources.*",
]

[tool.coverage.run]
source = ["src/krtour/map"]
branch = true

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "@overload",
]
fail_under = 50  # ADR-032 Sprint 1 bar (T-014 Sprint 1 진입과 함께 0→50 상향, 2026-05-25).
# ADR-032 Sprint별 fail_under schedule:
#   Sprint 1 (scaffolding):  fail_under = 50   ← 현재
#   Sprint 2 (core + 4 provider): 65
#   Sprint 3 (provider 절반 + infra): 75
#   Sprint 4 (integrity + edge cases): 80  ← 목표 도달
#   Sprint 5 (operational entry): 80 유지 + 회귀 방지
# 단계 상향 PR은 반드시 coverage gap 해소 PR과 묶음 (red main 0회).
# dto/는 Sprint 2부터 100% branch 항상 강제 (별도 [tool.coverage.report.partial_branches]).

# =============================================================================
# import-linter (의존 계층 강제) — 코드 작성 단계 시작 시 활성화
# =============================================================================

[tool.importlinter]
root_package = "krtour.map"
# forbidden contracts에 외부 패키지가 포함됨 (fastapi/uvicorn/cachetools/kafka).
include_external_packages = true

[[tool.importlinter.contracts]]
name = "layered architecture"
type = "layers"
# krtour.map.cli는 Sprint 4~5에서 추가 — 그때 layers 첫 줄에 다시 박는다.
# 의존 방향: category → dto → core → infra → providers → client → (cli)
layers = [
  "krtour.map.client",
  "krtour.map.providers",
  "krtour.map.infra",
  "krtour.map.core",
  "krtour.map.dto",
  "krtour.map.category",
]

# 메인 패키지(krtour.map)는 FastAPI/Uvicorn 의존을 가져선 안 된다 (ADR-020).
# 디버그 REST는 packages/krtour-map-debug-ui/(import: `krtour.map_debug_ui`)에 있다.
[[tool.importlinter.contracts]]
name = "main package must not import fastapi/uvicorn"
type = "forbidden"
source_modules = [
  "krtour.map",
]
forbidden_modules = [
  "fastapi",
  "uvicorn",
  "starlette",
]

# ADR-030: 라이브러리 in-memory 캐시 금지. functools.cache 한정 narrow 예외만 허용.
# 외부 캐시 라이브러리 의존 금지 — invalidation 책임 호출자(TripMate)에 위임.
# 예외: PlaceCategoryCode 카탈로그 (krtour.map.category), pyproj.Transformer singleton.
[[tool.importlinter.contracts]]
name = "main package must not depend on cache libraries"
type = "forbidden"
source_modules = [
  "krtour.map",
]
forbidden_modules = [
  "cachetools",
  "async_lru",
  "aiocache",
  "diskcache",
]

# ADR-103 (T-103 보류): 본 라이브러리는 Kafka/streaming consumer 의존 금지.
# streaming 도입 시 consumer는 TripMate apps/etl가 담당. 본 라이브러리는 함수만.
[[tool.importlinter.contracts]]
name = "main package must not depend on kafka/streaming libraries"
type = "forbidden"
source_modules = [
  "krtour.map",
]
forbidden_modules = [
  "kafka",
  "aiokafka",
  "confluent_kafka",
  "faust",
]
