[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "python-krtour-map-debug-ui"
version = "0.1.0"
description = "Local debug web UI for python-krtour-map feature ETL and storage checks."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [
  { name = "digitie" }
]
keywords = ["tripmate", "map", "debug", "etl", "korea"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = [
  "python-krtour-map>=0.1.0",
]

[project.scripts]
krtour-map-debug-ui = "krtour_map_debug_ui.server:main"
krtour-map-debug-api = "krtour_map_debug_ui.api:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["krtour_map_debug_ui*"]

[tool.setuptools.package-data]
krtour_map_debug_ui = ["py.typed"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
