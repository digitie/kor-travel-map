name: openapi

# ADR-031 — 디버그 패키지 OpenAPI export drift gate.
# Sprint 1 (현재): krtour.map_admin.app 모듈 미존재 — script가 명확한
# SystemExit 메시지로 실패. 본 workflow는 Sprint 2 첫 FastAPI 라우터 PR에서
# `continue-on-error: false`로 전환되어 정상 동작 시작.
#
# 활성화 후 검증:
# 1. `--profile all --check` 모드 — git working tree의 admin/user OpenAPI JSON이
#    라우터 + DTO의 실제 spec과 일치하는지 비교 (drift 시 exit 1).
# 2. 라우터/DTO 변경 PR은 반드시 openapi.json/openapi.user.json 갱신 commit 동반.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'src/krtour/map/dto/**'
      - 'packages/krtour-map-admin/**'
      - '.github/workflows/openapi.yml'

concurrency:
  group: openapi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install main package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install krtour-map-admin (editable)
        # PR#35 (2026-05-27): 첫 FastAPI 라우터 (`/debug/health`, `/debug/version`)
        # 머지로 정상 install 가능. Sprint 2 §2.5 추가 라우터는 후속 PR.
        run: |
          pip install -e packages/krtour-map-admin

      - name: OpenAPI drift check (ADR-031)
        # PR#35로 `continue-on-error: true` 제거. drift 시 즉시 머지 차단 — DTO/
        # 라우터 변경 PR은 반드시 `python scripts/export_openapi.py` 재실행 +
        # `openapi.json`/`openapi.user.json` commit을 동반.
        run: |
          python packages/krtour-map-admin/scripts/export_openapi.py \
            --profile all \
            --check \
            --output packages/krtour-map-admin/openapi.json
