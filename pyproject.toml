[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "python-krtour-map"
version = "0.1.0"
description = "TripMate map feature aggregation and CRUD contracts for Korean travel data providers."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "GPL-3.0-or-later" }
authors = [
  { name = "digitie" }
]
keywords = ["tripmate", "map", "features", "korea", "travel", "weather", "etl"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = [
  "pydantic>=2.7",
  "python-kraddr-base @ git+https://github.com/digitie/python-kraddr-base.git@1f3d2ac6c727ae6ad6bc32f8f88fd3f599c6bef6",
  "sqlalchemy>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.5",
  "mypy>=1.10",
]
visitkorea = [
  "python-visitkorea-api @ git+https://github.com/digitie/python-visitkorea-api.git@716ca303cf28ba599c3a2838ae48f2dd1a43b98d",
]
kasi = [
  "python-kasi-api @ git+https://github.com/digitie/python-kasi-api.git@a8940f78e804646fdadb377ad035dbcdce45a034",
]
datagokr = [
  "python-datagokr-api @ git+https://github.com/digitie/python-datagokr-api.git@ef7d3ab6961d851777023e344feecf869a8c8635",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
include = ["krtour_map*"]

[tool.setuptools.package-data]
krtour_map = ["py.typed"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "src"]
addopts = "-ra"
markers = [
  "integration: tests that touch an external database or provider",
]
