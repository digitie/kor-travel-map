services:
  postgres:
    image: postgis/postgis:16-3.5-alpine
    # T-102 — pg_prewarm autoprewarm background worker(부팅 후 buffer warm-up). 확장 자체는
    # alembic 0022가 만들고, autoprewarm(주기 dump + 재기동 reload)은 아래 server config로 켠다.
    # 저비용이라 standalone 스택 기본 on. 효과는 shared_buffers가 hot 데이터에 fit할 때 큼
    # (docs/performance.md §9.5). 끄려면 command override 제거.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_prewarm"
      - "-c"
      - "pg_prewarm.autoprewarm=on"
    environment:
      POSTGRES_DB: ${KOR_TRAVEL_MAP_POSTGRES_DB:-kor_travel_map}
      POSTGRES_USER: ${KOR_TRAVEL_MAP_POSTGRES_USER:-kor_travel_map}
      POSTGRES_PASSWORD: ${KOR_TRAVEL_MAP_POSTGRES_PASSWORD:-kor_travel_map}
      KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB: ${KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB:-kor_travel_map_dagster}
    ports:
      - "${KOR_TRAVEL_MAP_DOCKER_BIND_HOST:-127.0.0.1}:${KOR_TRAVEL_MAP_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - kor-travel-map-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KOR_TRAVEL_MAP_POSTGRES_USER:-kor_travel_map} -d ${KOR_TRAVEL_MAP_POSTGRES_DB:-kor_travel_map}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  dagster-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KOR_TRAVEL_MAP_POSTGRES_DB: ${KOR_TRAVEL_MAP_POSTGRES_DB:-kor_travel_map}
      KOR_TRAVEL_MAP_POSTGRES_USER: ${KOR_TRAVEL_MAP_POSTGRES_USER:-kor_travel_map}
      KOR_TRAVEL_MAP_POSTGRES_PASSWORD: ${KOR_TRAVEL_MAP_POSTGRES_PASSWORD:-kor_travel_map}
      KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB: ${KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB:-kor_travel_map_dagster}
      PGPASSWORD: ${KOR_TRAVEL_MAP_POSTGRES_PASSWORD:-kor_travel_map}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if ! echo "$$KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB" | grep -Eq '^[A-Za-z_][A-Za-z0-9_]*$$'; then
          echo "invalid KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB=$$KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB" >&2
          exit 1
        fi
        if psql -h postgres -U "$$KOR_TRAVEL_MAP_POSTGRES_USER" -d "$$KOR_TRAVEL_MAP_POSTGRES_DB" -tAc "SELECT 1 FROM pg_database WHERE datname = '$$KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB'" | grep -q 1; then
          echo "Dagster metadata DB exists: $$KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB"
        else
          createdb -h postgres -U "$$KOR_TRAVEL_MAP_POSTGRES_USER" "$$KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB"
          echo "Dagster metadata DB created: $$KOR_TRAVEL_MAP_DAGSTER_POSTGRES_DB"
        fi

  rustfs-perms:
    image: alpine:3.20
    user: root
    volumes:
      - kor-travel-map-rustfs-data:/data
    command: ["sh", "-c", "chown -R 10001:10001 /data"]

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID:-kor-travel-map-dev-access}
      RUSTFS_SECRET_KEY: ${KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-kor-travel-map-dev-secret}
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    command: ["/data"]
    depends_on:
      rustfs-perms:
        condition: service_completed_successfully
    ports:
      - "${KOR_TRAVEL_MAP_DOCKER_BIND_HOST:-127.0.0.1}:${KOR_TRAVEL_MAP_RUSTFS_API_PORT:-12101}:9000"
      - "${KOR_TRAVEL_MAP_DOCKER_BIND_HOST:-127.0.0.1}:${KOR_TRAVEL_MAP_RUSTFS_CONSOLE_PORT:-12105}:9001"
    volumes:
      - kor-travel-map-rustfs-data:/data

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      - rustfs
    environment:
      KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET: ${KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET:-kor-travel-map}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET:-kor-travel-map-uploads}
      KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID:-kor-travel-map-dev-access}
      KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-kor-travel-map-dev-secret}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set rustfs http://rustfs:9000 "$$KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID" "$$KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY"; do
          sleep 2
        done
        mc mb --ignore-existing "rustfs/$$KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET"
        mc mb --ignore-existing "rustfs/$$KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      KOR_TRAVEL_MAP_API_HOST: 0.0.0.0
      KOR_TRAVEL_MAP_API_PORT: ${KOR_TRAVEL_MAP_API_PORT:-12301}
      KOR_TRAVEL_MAP_API_CORS_ALLOW_ORIGINS: '["http://localhost:${KOR_TRAVEL_MAP_ADMIN_WEB_PORT:-12305}","http://127.0.0.1:${KOR_TRAVEL_MAP_ADMIN_WEB_PORT:-12305}"]'
      KOR_TRAVEL_MAP_API_DAGSTER_URL: ${KOR_TRAVEL_MAP_DOCKER_API_DAGSTER_URL:-http://dagster:${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}}
      KOR_TRAVEL_MAP_API_DAGSTER_ALLOWED_HOSTS: '${KOR_TRAVEL_MAP_DOCKER_API_DAGSTER_ALLOWED_HOSTS:-["dagster","127.0.0.1","localhost","::1"]}'
      KOR_TRAVEL_MAP_API_PROMETHEUS_METRICS_ENABLED: ${KOR_TRAVEL_MAP_API_PROMETHEUS_METRICS_ENABLED:-true}
      KOR_TRAVEL_MAP_API_PROMETHEUS_METRICS_PATH: ${KOR_TRAVEL_MAP_API_PROMETHEUS_METRICS_PATH:-/metrics}
      KOR_TRAVEL_MAP_PG_DSN: ${KOR_TRAVEL_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://kor_travel_map:kor_travel_map@postgres:5432/kor_travel_map}
      KOR_TRAVEL_MAP_OBJECT_STORE_ENDPOINT_URL: ${KOR_TRAVEL_MAP_DOCKER_OBJECT_STORE_ENDPOINT_URL:-http://rustfs:9000}
      KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET: ${KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET:-kor-travel-map}
      KOR_TRAVEL_MAP_OBJECT_STORE_REGION: ${KOR_TRAVEL_MAP_OBJECT_STORE_REGION:-us-east-1}
      KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID:-kor-travel-map-dev-access}
      KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-kor-travel-map-dev-secret}
      KOR_TRAVEL_MAP_OBJECT_STORE_PUBLIC_BASE_URL: ${KOR_TRAVEL_MAP_OBJECT_STORE_PUBLIC_BASE_URL:-http://127.0.0.1:${KOR_TRAVEL_MAP_RUSTFS_API_PORT:-12101}/${KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET:-kor-travel-map}}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET:-kor-travel-map-uploads}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY: ${KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KOR_TRAVEL_MAP_OPINET_API_KEY: ${KOR_TRAVEL_MAP_OPINET_API_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KOR_TRAVEL_MAP_KREX_EX_API_KEY: ${KOR_TRAVEL_MAP_KREX_EX_API_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KOR_TRAVEL_MAP_KREX_GO_API_KEY: ${KOR_TRAVEL_MAP_KREX_GO_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}}
      KOR_TRAVEL_MAP_API_KMA_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_KMA_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KMA_SERVICE_KEY:-${KMA_API_KEY:-}}}}
      KOR_TRAVEL_MAP_API_KMA_APIHUB_KEY: ${KOR_TRAVEL_MAP_API_KMA_APIHUB_KEY:-${KMA_APIHUB_AUTH_KEY:-${KMA_APIHUB_KEY:-}}}
      KOR_TRAVEL_MAP_API_OPINET_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_OPINET_SERVICE_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KOR_TRAVEL_MAP_API_DATAGOKR_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_DATAGOKR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KOR_TRAVEL_MAP_API_VISITKOREA_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_VISITKOREA_SERVICE_KEY:-${KTO_DATA_GO_KR_SERVICE_KEY:-${VISITKOREA_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-}}}}
      KOR_TRAVEL_MAP_API_KREX_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_KREX_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KOR_TRAVEL_MAP_API_KNPS_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_KNPS_SERVICE_KEY:-${KNPS_SERVICE_KEY:-${KNPS_API_KEY:-}}}
      KOR_TRAVEL_MAP_API_AIRKOREA_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_AIRKOREA_SERVICE_KEY:-${AIRKOREA_SERVICE_KEY:-${AIRKOREA_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-}}}}
      KOR_TRAVEL_MAP_API_KRFOREST_SERVICE_KEY: ${KOR_TRAVEL_MAP_API_KRFOREST_SERVICE_KEY:-${KRFOREST_SERVICE_KEY:-${KRFOREST_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-}}}}
    # 호스트 공유 서비스(kor-travel-geo :12201, kor-travel-docker-manager RustFS :12101) 접근 경로.
    # Docker Desktop과 달리 docker-ce는 host.docker.internal을 기본 제공하지 않는다 (#372).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "${KOR_TRAVEL_MAP_DOCKER_BIND_HOST:-127.0.0.1}:${KOR_TRAVEL_MAP_API_PORT:-12301}:${KOR_TRAVEL_MAP_API_PORT:-12301}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.environ.get('KOR_TRAVEL_MAP_API_PORT', '12301'), timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_KOR_TRAVEL_MAP_API: ${NEXT_PUBLIC_KOR_TRAVEL_MAP_API:-http://127.0.0.1:${KOR_TRAVEL_MAP_API_PORT:-12301}}
        NEXT_PUBLIC_KOR_TRAVEL_MAP_DAGSTER_URL: ${NEXT_PUBLIC_KOR_TRAVEL_MAP_DAGSTER_URL:-http://127.0.0.1:${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}}
        NEXT_PUBLIC_KOR_TRAVEL_GEO_BASE_URL: ${NEXT_PUBLIC_KOR_TRAVEL_GEO_BASE_URL:-http://127.0.0.1:12201}
        NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-${KOR_TRAVEL_GEO_VWORLD_API_KEY:-${VWORLD_API_KEY:-}}}
    environment:
      NEXT_PUBLIC_KOR_TRAVEL_MAP_API: ${NEXT_PUBLIC_KOR_TRAVEL_MAP_API:-http://127.0.0.1:${KOR_TRAVEL_MAP_API_PORT:-12301}}
      NEXT_PUBLIC_KOR_TRAVEL_MAP_DAGSTER_URL: ${NEXT_PUBLIC_KOR_TRAVEL_MAP_DAGSTER_URL:-http://127.0.0.1:${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}}
      NEXT_PUBLIC_KOR_TRAVEL_GEO_BASE_URL: ${NEXT_PUBLIC_KOR_TRAVEL_GEO_BASE_URL:-http://127.0.0.1:12201}
      NEXT_PUBLIC_VWORLD_API_KEY: ${NEXT_PUBLIC_VWORLD_API_KEY:-${KOR_TRAVEL_GEO_VWORLD_API_KEY:-${VWORLD_API_KEY:-}}}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${KOR_TRAVEL_MAP_DOCKER_BIND_HOST:-127.0.0.1}:${KOR_TRAVEL_MAP_ADMIN_WEB_PORT:-12305}:12305"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:12305/').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  dagster:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
      secrets:
        - github_token
    command:
      - /bin/sh
      - -c
      - dagster-webserver -m kortravelmap.dagster.definitions -h 0.0.0.0 -p "$${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}"
    env_file:
      - path: .env
        required: false
    environment:
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_DISABLE_TELEMETRY: ${DAGSTER_DISABLE_TELEMETRY:-yes}
      KOR_TRAVEL_MAP_DAGSTER_PORT: ${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}
      KOR_TRAVEL_MAP_DAGSTER_PG_URL: ${KOR_TRAVEL_MAP_DOCKER_DAGSTER_PG_URL:-postgresql://kor_travel_map:kor_travel_map@postgres:5432/kor_travel_map_dagster}
      KOR_TRAVEL_MAP_PG_DSN: ${KOR_TRAVEL_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://kor_travel_map:kor_travel_map@postgres:5432/kor_travel_map}
      KOR_TRAVEL_MAP_OBJECT_STORE_ENDPOINT_URL: ${KOR_TRAVEL_MAP_DOCKER_OBJECT_STORE_ENDPOINT_URL:-http://rustfs:9000}
      KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET: ${KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET:-kor-travel-map}
      KOR_TRAVEL_MAP_OBJECT_STORE_REGION: ${KOR_TRAVEL_MAP_OBJECT_STORE_REGION:-us-east-1}
      KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID:-kor-travel-map-dev-access}
      KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-kor-travel-map-dev-secret}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET:-kor-travel-map-uploads}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY: ${KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KOR_TRAVEL_MAP_OPINET_API_KEY: ${KOR_TRAVEL_MAP_OPINET_API_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KOR_TRAVEL_MAP_KREX_EX_API_KEY: ${KOR_TRAVEL_MAP_KREX_EX_API_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KOR_TRAVEL_MAP_KREX_GO_API_KEY: ${KOR_TRAVEL_MAP_KREX_GO_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      dagster-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    ports:
      - "${KOR_TRAVEL_MAP_DOCKER_BIND_HOST:-127.0.0.1}:${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}:${KOR_TRAVEL_MAP_DAGSTER_PORT:-12302}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/' % os.environ.get('KOR_TRAVEL_MAP_DAGSTER_PORT', '12302'), timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/dagster.Dockerfile
      secrets:
        - github_token
    env_file:
      - path: .env
        required: false
    environment:
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_DISABLE_TELEMETRY: ${DAGSTER_DISABLE_TELEMETRY:-yes}
      KOR_TRAVEL_MAP_DAGSTER_PG_URL: ${KOR_TRAVEL_MAP_DOCKER_DAGSTER_PG_URL:-postgresql://kor_travel_map:kor_travel_map@postgres:5432/kor_travel_map_dagster}
      KOR_TRAVEL_MAP_PG_DSN: ${KOR_TRAVEL_MAP_DOCKER_PG_DSN:-postgresql+asyncpg://kor_travel_map:kor_travel_map@postgres:5432/kor_travel_map}
      KOR_TRAVEL_MAP_OBJECT_STORE_ENDPOINT_URL: ${KOR_TRAVEL_MAP_DOCKER_OBJECT_STORE_ENDPOINT_URL:-http://rustfs:9000}
      KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET: ${KOR_TRAVEL_MAP_OBJECT_STORE_BUCKET:-kor-travel-map}
      KOR_TRAVEL_MAP_OBJECT_STORE_REGION: ${KOR_TRAVEL_MAP_OBJECT_STORE_REGION:-us-east-1}
      KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID: ${KOR_TRAVEL_MAP_OBJECT_STORE_ACCESS_KEY_ID:-kor-travel-map-dev-access}
      KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY: ${KOR_TRAVEL_MAP_OBJECT_STORE_SECRET_ACCESS_KEY:-kor-travel-map-dev-secret}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_BUCKET:-kor-travel-map-uploads}
      KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES: ${KOR_TRAVEL_MAP_OFFLINE_UPLOAD_MAX_BYTES:-104857600}
      KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY: ${KOR_TRAVEL_MAP_DATA_GO_KR_SERVICE_KEY:-${DATA_GO_KR_SERVICE_KEY:-${DATAGOKR_API_KEY:-${PUBLIC_DATA_SERVICE_KEY:-${SERVICE_KEY:-}}}}}
      KOR_TRAVEL_MAP_OPINET_API_KEY: ${KOR_TRAVEL_MAP_OPINET_API_KEY:-${OPINET_API_KEY:-${OPINET_SERVICE_KEY:-}}}
      KOR_TRAVEL_MAP_KREX_EX_API_KEY: ${KOR_TRAVEL_MAP_KREX_EX_API_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}
      KOR_TRAVEL_MAP_KREX_GO_API_KEY: ${KOR_TRAVEL_MAP_KREX_GO_API_KEY:-${DATA_GO_KR_SERVICE_KEY:-${KEX_GO_API_KEY:-${KREX_API_KEY:-${KREX_SERVICE_KEY:-}}}}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      dagster-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    command: ["dagster-daemon", "run", "-m", "kortravelmap.dagster.definitions"]

volumes:
  kor-travel-map-postgres:
  kor-travel-map-rustfs-data:
    name: ${KOR_TRAVEL_MAP_RUSTFS_VOLUME:-kor-travel-map-rustfs}

# private provider repo fetch용 (#370). 미설정(빈 값) 시 public pin만 fetch.
secrets:
  github_token:
    environment: GITHUB_TOKEN
